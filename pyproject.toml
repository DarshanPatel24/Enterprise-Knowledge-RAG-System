# Root workspace tooling configuration (not a distributable package).

[tool.ruff]
target-version = "py311"
line-length = 100
src = [
  "packages/contracts/src",
  "services/ekie/src",
  "services/ekre/src",
  "services/ekcp/src",
]
# Reference/teaching notebooks are not part of the shipped source and may target
# a newer Python syntax; exclude them from linting.
extend-exclude = ["*.ipynb"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S", "ANN"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101", "S106", "ANN"]
# Operational deploy/setup/ops scripts intentionally invoke external tools
# (docker, tesseract, sqlcmd) by name via subprocess; those are trusted,
# fixed command vectors, so the subprocess-hardening rules do not apply.
"**/scripts/**" = ["S603", "S607"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true