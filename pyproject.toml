# Root workspace tooling configuration (not a distributable package).

[tool.ruff]
target-version = "py311"
line-length = 100
src = [
  "packages/contracts/src",
  "services/ekie/src",
  "services/ekre/src",
  "services/ekcp/src",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S", "ANN"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101", "S106", "ANN"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true